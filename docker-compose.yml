services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: potprotesis_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      CI_ENVIRONMENT: development
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: potprotesis_db
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: pot_protesis
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: pot_user
      MYSQL_PASSWORD: pot_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
